<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LANK | Operasyon Merkezi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ... Eski stiller korunmalı ... */
        body { margin: 0; background: #010406; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #dashboard { display: none; height: 100vh; width: 100vw; display: flex; }
        
        /* MODAL PENCERE */
        .modal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: #0d1117; border: 1px solid #00d9ff; border-radius: 15px; z-index: 2000; padding: 20px; box-shadow: 0 0 30px rgba(0,217,255,0.5); }
        .close-btn { color: #00d9ff; cursor: pointer; float: right; font-size: 24px; }

        /* AI CHAT SABİT ALAN */
        #ai-sidebar { width: 300px; border-left: 1px solid #30363d; background: #0a0e12; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-screen">...</div>

    <div id="dashboard">
        <div id="sidebar">
            <img src="https://i.ibb.co/xt8TppJy/logo.png" class="side-logo">
            <div class="menu-btn" onclick="openModal('SİSTEM DURUMU', 'Sistem tüm protokolleri ile çalışıyor.')">
                <i class="fa-solid fa-gauge"></i><span>Dashboard</span>
            </div>
        </div>

        <div id="content" style="flex-grow:1; padding: 20px;">
            <div class="main-grid">
                <div class="module-card" onclick="runProcess('ai')">
                    <i class="fa-solid fa-robot"></i><h3>AI Analiz</h3>
                </div>
                <div class="module-card" onclick="runProcess('temizlik')">
                    <i class="fa-solid fa-broom"></i><h3>Sistem Temizliği</h3>
                </div>
            </div>
        </div>

        <div id="ai-sidebar">
            <div style="padding:15px; color:#00d9ff; font-weight:bold;">LANK AI ASİSTAN</div>
            <iframe src="https://www.chatbase.co/chatbot-iframe/SENIN_CHATBASE_ID" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <span class="close-btn" onclick="document.getElementById('actionModal').style.display='none'">&times;</span>
        <h2 id="modalTitle" style="color:#00d9ff;"></h2>
        <div id="modalContent"></div>
    </div>

    <script>
        // Modal açma fonksiyonu
        function openModal(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('actionModal').style.display = 'block';
        }

        // İşlem fonksiyonu güncellendi
        async function runProcess(command) {
            openModal("İŞLEM BAŞLATILIYOR...", "Lütfen bekleyin, sunucu ile iletişim kuruluyor...");
            
            try {
                let response = await fetch('https://lank-sec.onrender.com/islem', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({komut: command})
                });
                let data = await response.json();
                document.getElementById('modalContent').innerHTML = `<h3>Sonuç:</h3><p>${data.mesaj}</p>`;
            } catch (err) {
                document.getElementById('modalContent').innerHTML = "HATA: Sunucu şu an uyku modunda olabilir.";
            }
        }
    </script>
</body>
</html>
